/*
 * Key names may be quoted or unquoted, in both definitions and
 * references, and a hyphenated name works in either form.
 */
key rndc-key {
	algorithm hmac-sha256;
	secret "1234abcd8765";
};

key "rndc_key" {
	algorithm hmac-sha256;
	secret "1234abcd8765";
};

controls {
	inet 127.0.0.1 port 953 allow { any; } keys { "rndc-key"; rndc_key; };
};
